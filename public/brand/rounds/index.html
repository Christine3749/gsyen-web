<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSYEN Brand Logo Rounds</title>
    <style>
      body {
        margin: 0;
        background: #f4f2ee;
        color: #1a1a1a;
        font-family: Arial, sans-serif;
      }
      main {
        max-width: 1440px;
        margin: 0 auto;
        padding: 48px;
      }
      h1 {
        font-family: Georgia, serif;
        font-size: 34px;
        letter-spacing: 8px;
        font-weight: 400;
        margin: 0 0 32px;
      }
      section {
        display: grid;
        gap: 28px;
      }
      figure {
        margin: 0;
        border: 1px solid rgb(26 26 26 / 10%);
        background: #f9f8f6;
      }
      img {
        display: block;
        width: 100%;
        height: auto;
      }
      figcaption {
        padding: 14px 18px;
        font-size: 12px;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: rgb(26 26 26 / 62%);
        border-top: 1px solid rgb(26 26 26 / 8%);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GSYEN LOGO ROUNDS</h1>
      <section>
        <figure>
          <img src="./round-01-classic-lockup.svg" alt="Round 01 classic lockup" />
          <figcaption>Round 01 · Classic Lockup</figcaption>
        </figure>
        <figure>
          <img src="./round-02-dark-marque.svg" alt="Round 02 dark marque" />
          <figcaption>Round 02 · Dark Marque</figcaption>
        </figure>
        <figure>
          <img src="./round-03-header-lockup.svg" alt="Round 03 header lockup" />
          <figcaption>Round 03 · Header Lockup</figcaption>
        </figure>
        <figure>
          <img src="./round-04-icon-suite.svg" alt="Round 04 icon suite" />
          <figcaption>Round 04 · Icon Suite</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
