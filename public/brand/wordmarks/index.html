<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSYEN Wordmark Rounds</title>
    <style>
      body { margin: 0; background: #f4f2ee; color: #1a1a1a; font-family: Arial, sans-serif; }
      main { max-width: 1320px; margin: 0 auto; padding: 44px; }
      h1 { margin: 0 0 28px; font: 400 34px Georgia, serif; letter-spacing: 8px; }
      section { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 24px; }
      figure { margin: 0; background: #f9f8f6; border: 1px solid rgb(26 26 26 / 10%); }
      img { display: block; width: 100%; height: auto; }
      figcaption { padding: 12px 16px; border-top: 1px solid rgb(26 26 26 / 8%); color: rgb(26 26 26 / 64%); font-size: 12px; letter-spacing: 4px; text-transform: uppercase; }
      @media (max-width: 900px) { section { grid-template-columns: 1fr; } main { padding: 24px; } }
    </style>
  </head>
  <body>
    <main>
      <h1>GSYEN WORDMARK ROUNDS</h1>
      <section>
        <figure><img src="./wordmark-01-narrow-plaque.svg" alt="Wordmark 01" /><figcaption>01 · Narrow Plaque</figcaption></figure>
        <figure><img src="./wordmark-02-chinese-first.svg" alt="Wordmark 02" /><figcaption>02 · Chinese First</figcaption></figure>
        <figure><img src="./wordmark-03-engineering.svg" alt="Wordmark 03" /><figcaption>03 · Engineering</figcaption></figure>
        <figure><img src="./wordmark-04-republican-ledger.svg" alt="Wordmark 04" /><figcaption>04 · Republican Ledger</figcaption></figure>
        <figure><img src="./wordmark-05-cast-plate.svg" alt="Wordmark 05" /><figcaption>05 · Cast Plate</figcaption></figure>
        <figure><img src="./wordmark-06-balanced-grid.svg" alt="Wordmark 06" /><figcaption>06 · Balanced Grid</figcaption></figure>
        <figure><img src="./wordmark-07-minimal-interface.svg" alt="Wordmark 07" /><figcaption>07 · Minimal Interface</figcaption></figure>
        <figure><img src="./wordmark-08-seal-and-name.svg" alt="Wordmark 08" /><figcaption>08 · Seal And Name</figcaption></figure>
      </section>
    </main>
  </body>
</html>
