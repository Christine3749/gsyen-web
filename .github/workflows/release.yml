name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: C:/gsyen-dist/GSYEN-Setup-Windows.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install oss2
        run: python -m pip install oss2

      - name: Upload to OSS
        env:
          OSS_KEY_ID: ${{ secrets.OSS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_KEY_SECRET }}
        shell: python
        run: |
          import os, oss2
          auth = oss2.Auth(os.environ['OSS_KEY_ID'], os.environ['OSS_KEY_SECRET'])
          bucket = oss2.Bucket(auth, 'https://oss-cn-shenzhen.aliyuncs.com', 'gsyen-releases')
          bucket.put_object_from_file('GSYEN-Setup-Windows.exe', 'C:/gsyen-dist/GSYEN-Setup-Windows.exe')
          print('Upload OK')
