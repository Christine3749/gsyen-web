name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Bundle v2ray-core (Windows)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/v2fly/v2ray-core/releases/download/v5.49.0/v2ray-windows-64.zip" -OutFile v2ray.zip
          Expand-Archive -Path v2ray.zip -DestinationPath electron/v2ray-core -Force
          # 精简：删掉 23MB 全球 geoip，只保留 224KB 的 CN+内网精简库（配置已用 ext: 引用它）
          Remove-Item electron/v2ray-core/geoip.dat -Force -ErrorAction SilentlyContinue
          if (-not (Test-Path electron/v2ray-core/geoip-only-cn-private.dat)) {
            Invoke-WebRequest -Uri "https://github.com/v2fly/geoip/releases/latest/download/geoip-only-cn-private.dat" -OutFile electron/v2ray-core/geoip-only-cn-private.dat
          }
          Set-Content -Path electron/v2ray-nodes.json -Value $env:V2RAY_NODES -NoNewline
        env:
          V2RAY_NODES: ${{ secrets.V2RAY_NODES }}

      - name: Build Windows
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GSYEN_API_URL: ${{ secrets.VITE_GSYEN_API_URL }}

      - name: Upload Windows to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ../gsyen-dist/GSYEN-Setup-*.exe
            ../gsyen-dist/latest.yml

      - name: Upload Windows to R2
        continue-on-error: true
        run: |
          aws s3 cp "..\gsyen-dist\GSYEN-Setup-Windows.exe" s3://gsyen-releases/GSYEN-Setup-Windows.exe --endpoint-url https://4dceba8f9d03d121208467416a73c948.r2.cloudflarestorage.com
        shell: pwsh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build Mac
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GSYEN_API_URL: ${{ secrets.VITE_GSYEN_API_URL }}

      - name: Upload Mac to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ../gsyen-dist/GSYEN-Setup-Mac-*.dmg
            ../gsyen-dist/latest-mac.yml
          body: |
            ## macOS 安装说明
            - **Apple Silicon (M1/M2/M3)** → 下载 `GSYEN-Setup-Mac-arm64.dmg`
            - **Intel Mac** → 下载 `GSYEN-Setup-Mac-x64.dmg`

            > **首次打开提示 "已损坏"？** 右键点击 GSYEN.app → 选"打开" → 点"打开"即可。此后双击正常启动。

      - name: Upload Mac to R2
        continue-on-error: true
        run: |
          aws s3 cp "../gsyen-dist/GSYEN-Setup-Mac-arm64.dmg" s3://gsyen-releases/GSYEN-Setup-Mac-arm64.dmg --endpoint-url https://4dceba8f9d03d121208467416a73c948.r2.cloudflarestorage.com
          aws s3 cp "../gsyen-dist/GSYEN-Setup-Mac-x64.dmg" s3://gsyen-releases/GSYEN-Setup-Mac-x64.dmg --endpoint-url https://4dceba8f9d03d121208467416a73c948.r2.cloudflarestorage.com
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
