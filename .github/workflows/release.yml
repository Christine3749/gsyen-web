name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build Windows
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ../gsyen-dist/GSYEN-Setup-*.exe
            ../gsyen-dist/latest.yml

      - name: Upload Windows to OSS
        continue-on-error: true
        run: |
          Invoke-WebRequest -Uri "https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil64.exe" -OutFile ossutil.exe
          .\ossutil.exe cp "..\gsyen-dist\GSYEN-Setup-Windows.exe" oss://gsyen-releases/GSYEN-Setup-Windows.exe -e oss-cn-shenzhen.aliyuncs.com -i $env:OSS_KEY_ID -k $env:OSS_KEY_SECRET -f
        shell: pwsh
        env:
          OSS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build Mac
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ../gsyen-dist/GSYEN-Setup-Mac-*.dmg
            ../gsyen-dist/latest-mac.yml
          body: |
            ## macOS 安装说明
            - **Apple Silicon (M1/M2/M3)** → 下载 `GSYEN-Setup-Mac-arm64.dmg`
            - **Intel Mac** → 下载 `GSYEN-Setup-Mac-x64.dmg`

            > **首次打开提示 "已损坏"？** 右键点击 GSYEN.app → 选"打开" → 点"打开"即可。此后双击正常启动。

      - name: Upload Mac to OSS
        continue-on-error: true
        run: |
          curl -sL https://gosspublic.alicdn.com/ossutil/1.7.19/ossutilmac64 -o ossutil
          chmod +x ossutil
          ./ossutil cp "../gsyen-dist/GSYEN-Setup-Mac-arm64.dmg" oss://gsyen-releases/GSYEN-Setup-Mac-arm64.dmg -e oss-cn-shenzhen.aliyuncs.com -i $OSS_KEY_ID -k $OSS_KEY_SECRET -f
          ./ossutil cp "../gsyen-dist/GSYEN-Setup-Mac-x64.dmg" oss://gsyen-releases/GSYEN-Setup-Mac-x64.dmg -e oss-cn-shenzhen.aliyuncs.com -i $OSS_KEY_ID -k $OSS_KEY_SECRET -f
        env:
          OSS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
