name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build Windows
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ../gsyen-dist/GSYEN-Setup-*.exe
            ../gsyen-dist/latest.yml

      - name: Upload Windows to OSS
        run: |
          pip install "awscli<2" --quiet
          aws configure set aws_access_key_id $env:OSS_KEY_ID
          aws configure set aws_secret_access_key $env:OSS_KEY_SECRET
          aws configure set default.s3.addressing_style virtual
          aws configure set default.s3.multipart_threshold 500MB
          aws configure set default.s3.payload_signing_enabled false
          aws s3 cp "..\gsyen-dist\GSYEN-Setup-Windows.exe" s3://gsyen-releases/GSYEN-Setup-Windows.exe --endpoint-url https://oss-cn-shenzhen.aliyuncs.com
        shell: pwsh
        env:
          OSS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build Mac
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ../gsyen-dist/GSYEN-Setup-Mac.dmg

      - name: Upload Mac to OSS
        run: |
          pip install "awscli<2" --quiet
          aws configure set aws_access_key_id $OSS_KEY_ID
          aws configure set aws_secret_access_key $OSS_KEY_SECRET
          aws configure set default.s3.addressing_style virtual
          aws configure set default.s3.multipart_threshold 500MB
          aws configure set default.s3.payload_signing_enabled false
          aws s3 cp "../gsyen-dist/GSYEN-Setup-Mac.dmg" s3://gsyen-releases/GSYEN-Setup-Mac.dmg --endpoint-url https://oss-cn-shenzhen.aliyuncs.com
        env:
          OSS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
